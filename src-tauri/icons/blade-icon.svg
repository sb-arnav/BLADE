<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient: very dark with subtle blue tint -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a10;stop-opacity:1" />
    </linearGradient>
    <!-- Text gradient: blue to violet -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <!-- Slash accent gradient -->
    <linearGradient id="slashGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#93c5fd;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.3" />
    </linearGradient>
    <!-- Subtle glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>

  <!-- Subtle inner border glow -->
  <rect width="512" height="512" rx="112" ry="112"
        fill="none" stroke="#818cf8" stroke-width="1.5" stroke-opacity="0.12"/>

  <!-- Diagonal slash accent — sharp geometric element behind text -->
  <line x1="310" y1="128" x2="202" y2="384"
        stroke="url(#slashGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

  <!-- BLADE text — condensed, tracked, centered -->
  <text
    x="256"
    y="298"
    font-family="'SF Pro Display', 'Helvetica Neue', 'Arial', sans-serif"
    font-size="112"
    font-weight="800"
    letter-spacing="8"
    text-anchor="middle"
    fill="url(#textGrad)"
    filter="url(#glow)"
  >BLADE</text>

  <!-- Thin underline accent below text -->
  <line x1="100" y1="328" x2="412" y2="328"
        stroke="url(#textGrad)" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Tagline — tiny, barely visible -->
  <text
    x="256"
    y="358"
    font-family="'SF Pro Display', 'Helvetica Neue', 'Arial', sans-serif"
    font-size="18"
    font-weight="400"
    letter-spacing="6"
    text-anchor="middle"
    fill="#818cf8"
    opacity="0.45"
  >PERSONAL AI</text>
</svg>
