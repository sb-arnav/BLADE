name: Validate Blade

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  smoke-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend deps
        run: npm ci

      - name: Typecheck frontend
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build
