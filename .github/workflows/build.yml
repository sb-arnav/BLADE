name: Validate Blade

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  smoke-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install frontend deps
        run: npm ci

      # Rust toolchain + system deps land BEFORE verify:all because the
      # eval gates (verify:eval, verify:safety, verify:hormone, verify:inference,
      # verify:vitality, verify:organism, verify:intelligence) call
      # `cargo test --lib evals` which transitively pulls glib-sys / gtk-sys
      # build-script crates. Without the apt deps, cargo-build fails with
      # "system library glib-2.0 was not found". Phase 38 close (2026-05-08)
      # caught this when verify:wiring-audit-shape stopped fast-failing first.
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust deps
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system deps (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libasound2-dev \
            libdbus-1-dev \
            libsecret-1-dev \
            libglib2.0-dev \
            libxdo-dev \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            libclang-dev \
            libdrm-dev \
            libgbm-dev \
            pkg-config

      # ───── Phase 1 invariants (D-27, D-31, D-33, D-34, D-45-regress) ─────
      # Run BEFORE typecheck / build — these are pure fs-scan scripts that
      # fail in ~3s, giving a clean early-abort signal without waiting for
      # the 60s Vite + 90s cargo-check pipelines.
      - name: Phase 1 verify:all
        run: npm run verify:all

      - name: ESLint (blade/no-raw-tauri rule)
        # D-34: CI-enforced, not reviewer-required. src/ is freshly built in
        # Phase 1 with the rule active from Day 1 — zero pre-existing
        # violations expected. Failure blocks merge (no `|| true` escape).
        run: npm run lint

      - name: Migration-ledger idempotency
        # D-28: re-seeding should produce identical output. Drift means the
        # ledger was hand-edited but `npm run seed:ledger` wasn't re-run
        # (or a feature cluster changed without a corresponding ledger row).
        run: |
          npm run seed:ledger
          git diff --exit-code .planning/migration-ledger.md || {
            echo "::error::migration-ledger.md regenerated with drift; commit the seed output"
            exit 1
          }

      - name: Typecheck frontend
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build

      - name: Verify all 5 HTML files present in dist/ (WIN-09)
        run: npm run verify:html-entries

      # Phase 1 intentional: Playwright listener-leak test runs locally via
      # `npm run test:e2e` — wiring into CI deferred to Phase 9 Polish Pass
      # (requires xvfb-run + extra ~2min per job; not worth it while the full
      # Tauri harness isn't live).
      # Rust + system deps installed earlier (above the verify:all step).

      - name: Rust check (catch compile errors early)
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Memory recall eval (v1.2 quality scaffolding)
        # First quality measurement on the memory cluster. Per the v1.2
        # maturity audit (.planning/notes/v1-2-self-improvement-maturity.md),
        # zero of the load-bearing self-improvement / memory modules had
        # any tests. This is the seed eval — fixture-driven hybrid_search
        # ranking with top-1 / top-3 / MRR metrics and floor assertions.
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib memory_recall_eval -- --nocapture
