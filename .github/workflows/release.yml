name: Release Blade

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bundles: nsis,msi
          - os: macos-latest
            bundles: app,dmg
          - os: ubuntu-24.04
            bundles: appimage,deb,rpm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            libasound2-dev libdbus-1-dev pkg-config libssl-dev \
            libsecret-1-dev libglib2.0-dev libxdo-dev \
            libpipewire-0.3-dev libspa-0.2-dev \
            libdrm-dev libgbm-dev

      - name: Install frontend deps
        run: npm ci

      - name: Prepare updater config
        run: npm run release:prepare-updater
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}

      - name: Build and publish release artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Blade ${{ github.ref_name }}
          releaseBody: "Installers and updater metadata for Blade."
          releaseDraft: false
          prerelease: false
          args: --config src-tauri/tauri.release.conf.json --bundles ${{ matrix.bundles }}
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
