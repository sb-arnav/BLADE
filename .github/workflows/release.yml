name: Release Blade

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bundles: nsis,msi
          - os: macos-latest
            bundles: app,dmg
          - os: ubuntu-24.04
            bundles: appimage,deb,rpm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf \
            libasound2-dev libdbus-1-dev pkg-config libssl-dev \
            libsecret-1-dev libglib2.0-dev libxdo-dev \
            libpipewire-0.3-dev libspa-0.2-dev libclang-dev \
            libdrm-dev libgbm-dev

      - name: Install frontend deps
        run: npm ci

      - name: Prepare updater config
        run: npm run release:prepare-updater
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}

      - name: Build and publish release artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Blade ${{ github.ref_name }}
          releaseBody: "Installers and updater metadata for Blade."
          releaseDraft: false
          prerelease: false
          args: --config src-tauri/tauri.release.conf.json --bundles ${{ matrix.bundles }}
          includeUpdaterJson: true
          updaterJsonPreferNsis: true

      # v2.3 Phase 64 (MAC-SIGNED-RELEASE no-cert workaround) — defense-in-depth
      # re-codesign with a stable bundle identifier. tauri.conf.json now sets
      # bundle.macOS.signingIdentity = "-" so tauri should already ad-hoc sign
      # with the stable identifier (site.slayerblade.blade). This step re-asserts
      # post-build in case tauri-action ever falls back to linker-signed (which
      # generates a random per-build identifier and triggers the keychain ACL
      # re-prompt storm — Mac UAT 2026-05-17 report B2). No Apple Developer ID
      # certificate required. Users still see the Gatekeeper "unidentified
      # developer" prompt on first launch (xattr -cr workaround in README).
      # No untrusted input is interpolated into the run script — only static
      # strings + find/codesign with literal arguments.
      - name: Force-stable bundle identifier (macOS no-cert workaround)
        if: runner.os == 'macOS'
        env:
          STABLE_BUNDLE_ID: site.slayerblade.blade
        run: |
          set -e
          APP_PATH=$(find src-tauri/target/release/bundle/macos -name "*.app" -maxdepth 2 -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "::warning::No .app bundle found under src-tauri/target/release/bundle/macos — skipping re-codesign."
            exit 0
          fi
          echo "Re-codesigning $APP_PATH with stable identifier $STABLE_BUNDLE_ID"
          codesign --force --deep --sign - --identifier "$STABLE_BUNDLE_ID" "$APP_PATH"
          echo "Verification:"
          codesign -dv "$APP_PATH" 2>&1 | grep -E "Identifier|Signature|flags" || true
