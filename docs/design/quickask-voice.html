<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>BLADE — QuickAsk · Voice (Ctrl+Shift+B)</title>
<link rel="stylesheet" href="shared.css"/>
<link rel="stylesheet" href="orb.css"/>
<link rel="stylesheet" href="proto.css"/>
<style>
  /* Scrim sits BELOW the stage/card so its blur only affects the wallpaper. */
  .overlay-scrim {
    position: absolute; inset: 0; z-index: 1;
    background: radial-gradient(ellipse at 50% 40%, rgba(0,0,0,0.28) 0%, rgba(0,0,0,0.58) 100%);
    backdrop-filter: blur(3px);
    pointer-events: none;
  }

  .qa-voice {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 640px;
    padding: 40px 48px 28px;
    border-radius: 32px;
    z-index: 10;
    text-align: center;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.14) 0%, rgba(255, 255, 255, 0.06) 100%);
    border: 1px solid rgba(255,255,255,0.14);
    backdrop-filter: blur(48px) saturate(200%);
    -webkit-backdrop-filter: blur(48px) saturate(200%);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.22),
      0 40px 80px rgba(0,0,0,0.5),
      0 0 0 1px rgba(0,0,0,0.2);
  }

  /* Model pill at top */
  .qa-head {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    margin-bottom: 12px;
  }
  .model-pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 5px 12px 5px 6px;
    border-radius: 999px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.14);
    font-size: 11px; font-weight: 500; color: var(--t-2);
  }
  .model-pill .lg {
    width: 18px; height: 18px; border-radius: 6px;
    background: linear-gradient(135deg, #c96442, #f0a97e);
    color: #fff; display: grid; place-items: center;
    font-weight: 700; font-size: 10px;
  }
  .model-pill svg { width: 10px; height: 10px; stroke: currentColor; fill: none; stroke-width: 2; opacity: 0.55; }

  .voice-mode-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 10px 5px 8px;
    border-radius: 999px;
    background: rgba(138,255,199,0.10);
    border: 1px solid rgba(138,255,199,0.25);
    color: #c4ffe0;
    font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
  }
  .voice-mode-pill .dot { width: 5px; height: 5px; border-radius: 50%; background: #8affc7; box-shadow: 0 0 6px #8affc7; animation: pulse-dot 1.4s ease-in-out infinite; }

  /* The orb */
  .qa-orb-slot {
    width: 320px; height: 320px;
    margin: 8px auto 4px;
    display: grid; place-items: center;
    position: relative;
  }
  .qa-orb-slot .orb-overlay { width: 320px; height: 320px; }
  .qa-orb-slot .orb-overlay::before { inset: 10%; }

  /* Elapsed time under orb (mono, quiet) */
  .qa-timer {
    font-family: 'JetBrains Mono';
    font-size: 12px;
    color: var(--t-3);
    margin-bottom: 4px;
    letter-spacing: 0;
  }

  /* Live transcript */
  .qa-transcript {
    margin: 12px auto 18px;
    max-width: 520px;
    min-height: 72px;
    font-size: 20px; line-height: 1.4; letter-spacing: -0.015em;
    color: var(--t-1);
    font-weight: 400;
  }
  .qa-transcript .final { color: #fff; }
  .qa-transcript .partial { color: rgba(255,255,255,0.52); }
  .qa-transcript .caret {
    display: inline-block; width: 2px; height: 18px; margin-left: 2px;
    background: #fff; vertical-align: -2px;
    animation: caret-blink 1s step-end infinite;
  }
  @keyframes caret-blink { 50% { opacity: 0; } }

  /* Audio meter — tiny row of bars along the bottom of transcript area */
  .audio-meter {
    display: flex; justify-content: center; gap: 3px;
    margin: 18px auto 20px;
    height: 14px; align-items: center;
  }
  .audio-meter span {
    width: 3px; border-radius: 2px;
    background: linear-gradient(180deg, rgba(255,255,255,0.75), rgba(255,255,255,0.25));
    animation: wv 1.1s ease-in-out infinite;
  }
  .audio-meter span:nth-child(1)  { height: 4px;  animation-delay: 0s; }
  .audio-meter span:nth-child(2)  { height: 8px;  animation-delay: -0.08s; }
  .audio-meter span:nth-child(3)  { height: 12px; animation-delay: -0.16s; }
  .audio-meter span:nth-child(4)  { height: 6px;  animation-delay: -0.24s; }
  .audio-meter span:nth-child(5)  { height: 14px; animation-delay: -0.32s; }
  .audio-meter span:nth-child(6)  { height: 10px; animation-delay: -0.40s; }
  .audio-meter span:nth-child(7)  { height: 4px;  animation-delay: -0.48s; }
  .audio-meter span:nth-child(8)  { height: 8px;  animation-delay: -0.56s; }
  .audio-meter span:nth-child(9)  { height: 12px; animation-delay: -0.64s; }
  .audio-meter span:nth-child(10) { height: 5px;  animation-delay: -0.72s; }
  .audio-meter span:nth-child(11) { height: 10px; animation-delay: -0.80s; }
  .audio-meter span:nth-child(12) { height: 4px;  animation-delay: -0.88s; }
  @keyframes wv { 0%,100% { transform: scaleY(0.5);} 50% { transform: scaleY(1.1);} }

  /* Footer keyboard hints */
  .qa-footer {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 4px 0;
    border-top: 1px solid rgba(255,255,255,0.08);
    font-size: 11px; color: var(--t-3);
  }
  .qa-footer .left, .qa-footer .right { display: flex; gap: 14px; align-items: center; }
  .qa-footer .item { display: flex; align-items: center; gap: 5px; }
  .kbd {
    font-family: 'JetBrains Mono'; font-size: 10px; font-weight: 600;
    padding: 2px 6px; border-radius: 4px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: var(--t-2);
  }
  .send-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px 6px 14px;
    background: linear-gradient(180deg, #fff, rgba(255,255,255,0.82));
    color: #1a0b2a;
    border-radius: 999px;
    font-size: 11px; font-weight: 600; letter-spacing: -0.005em;
    box-shadow: inset 0 1px 0 #fff, 0 4px 12px rgba(0,0,0,0.25);
    cursor: pointer; border: none;
  }
  .send-btn svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 2.2; }
  .send-btn .kbd { background: rgba(26,11,42,0.12); color: #1a0b2a; border-color: rgba(26,11,42,0.2); margin-left: 2px; }

  /* Phase switcher — prototype only */
  .phase-switcher {
    position: absolute; top: 24px; left: 24px; z-index: 300;
    display: flex; gap: 4px;
    padding: 6px;
    background: rgba(10, 5, 30, 0.55);
    border: 1px solid rgba(255, 255, 255, 0.14);
    backdrop-filter: blur(20px) saturate(160%);
    border-radius: 999px;
    font-family: 'Inter'; font-size: 11px;
  }
  .phase-switcher .ps {
    padding: 6px 12px; border-radius: 999px;
    color: rgba(255,255,255,0.65);
    cursor: pointer; border: none; background: transparent;
    font: inherit;
    transition: all 160ms;
  }
  .phase-switcher .ps:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .phase-switcher .ps.active {
    background: rgba(255,255,255,0.18);
    color: #fff;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.22);
  }
</style>
</head>
<body>
<div class="wallpaper"></div>
<div class="overlay-scrim"></div>

<div class="phase-switcher" data-proto-only>
  <button class="ps" data-phase="idle">Idle</button>
  <button class="ps active" data-phase="listening">Listening</button>
  <button class="ps" data-phase="thinking">Thinking</button>
  <button class="ps" data-phase="speaking">Speaking</button>
</div>

<div class="stage">

  <div class="qa-voice">

    <div class="qa-head">
      <div class="model-pill">
        <span class="lg">A</span>
        Claude Sonnet 4.6
        <svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <div class="voice-mode-pill">
        <span class="dot"></span>
        Voice · Whisper-v4
      </div>
    </div>

    <div class="qa-orb-slot">
      <div class="orb-overlay" data-phase="listening" id="orb">
        <svg class="orb-rings" viewBox="-220 -220 440 440">
          <circle class="ring ring-0" cx="0" cy="0" r="90"/>
          <circle class="ring ring-1" cx="0" cy="0" r="90"/>
          <circle class="ring ring-2" cx="0" cy="0" r="90"/>
        </svg>
        <svg class="orb-arcs" viewBox="-220 -220 440 440">
          <circle class="arc arc-1" cx="0" cy="0" r="70"/>
          <circle class="arc arc-2" cx="0" cy="0" r="70"/>
        </svg>
        <div class="orb-core"></div>
      </div>
    </div>

    <div class="qa-timer" id="timer">00:04.2</div>

    <div class="qa-transcript" id="transcript">
      <span class="final" id="tr-final">Summarize Federico's comment on the hero card </span><span class="partial" id="tr-partial">and draft a reply agreeing to the blur change</span><span class="caret"></span>
    </div>

    <div class="audio-meter">
      <span></span><span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="qa-footer">
      <div class="left">
        <div class="item">Pause <span class="kbd">Space</span></div>
        <div class="item">Restart <span class="kbd">⌘ R</span></div>
        <div class="item">Cancel <span class="kbd">Esc</span></div>
      </div>
      <div class="right">
        <span class="item" style="color: var(--t-4); font-family: 'JetBrains Mono'; font-size: 10px;">ctx 2%</span>
        <button class="send-btn">
          Send
          <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
          <span class="kbd">↵</span>
        </button>
      </div>
    </div>

  </div>

</div>

<script>
  (function () {
    const orb = document.getElementById('orb');
    const trFinal = document.getElementById('tr-final');
    const trPartial = document.getElementById('tr-partial');
    const timer = document.getElementById('timer');
    const switcher = document.querySelectorAll('.phase-switcher .ps');

    const phases = {
      idle:      { timer: '00:00.0', final: '',                                                      partial: 'Tap Space or say "Hey BLADE" to start.' },
      listening: { timer: '00:04.2', final: "Summarize Federico's comment on the hero card ",       partial: 'and draft a reply agreeing to the blur change' },
      thinking:  { timer: '00:06.7', final: 'Reading the Figma thread and checking your tokens…',  partial: '' },
      speaking:  { timer: '00:08.3', final: 'Reply drafted — he asked for a lighter blur and tighter stats row. I agreed, noted ', partial: "we've moved to variant C. Send?" },
    };

    function setPhase(p) {
      orb.setAttribute('data-phase', p);
      timer.textContent = phases[p].timer;
      trFinal.textContent = phases[p].final;
      trPartial.textContent = phases[p].partial;
      switcher.forEach((b) => b.classList.toggle('active', b.dataset.phase === p));
    }

    switcher.forEach((b) => b.addEventListener('click', () => setPhase(b.dataset.phase)));

    window.PROTO_CURRENT = 'quickask-voice.html';
  })();
</script>
<script src="proto.js"></script>
</body>
</html>
