<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>BLADE — Onboarding · Ready</title>
<link rel="stylesheet" href="shared.css"/>
<link rel="stylesheet" href="proto.css"/>
<style>
  .onb {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 820px; padding: 72px 80px 56px;
    border-radius: var(--r-2xl);
    text-align: center;
  }
  .onb-steps { display: flex; gap: 10px; align-items: center; justify-content: center; margin-bottom: 36px; }
  .step-pill { display: flex; align-items: center; gap: 10px; padding: 8px 16px 8px 10px; border-radius: var(--r-pill);
               background: rgba(255,255,255,0.08); font-size: 12px; color: var(--t-3); border: 1px solid var(--g-edge-lo); }
  .step-pill .num { width: 20px; height: 20px; border-radius: 50%; display: grid; place-items: center;
                     background: rgba(255,255,255,0.08); font-weight: 600; font-size: 11px; color: var(--t-3); }
  .step-pill.active { color: var(--t-1); background: rgba(255,255,255,0.16); border-color: var(--g-edge-mid); }
  .step-pill.active .num { background: #fff; color: #1a0b2a; }
  .step-pill.done .num { background: rgba(138,255,199,0.22); border: 1px solid rgba(138,255,199,0.4);
                         background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238affc7' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><polyline points='20 6 9 17 4 12'/></svg>"); background-size: 12px; background-position: center; background-repeat: no-repeat; color: transparent; }
  .step-divider { width: 18px; height: 1px; background: var(--line-strong); }

  .hero {
    width: 128px; height: 128px; border-radius: 40px;
    background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.65) 100%);
    color: #1a0b2a; display: grid; place-items: center; font-weight: 800; font-size: 52px; letter-spacing: -0.04em;
    margin: 0 auto 28px;
    box-shadow: inset 0 2px 0 #fff, 0 30px 60px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.3),
                0 0 120px rgba(255,255,255,0.18);
    position: relative;
  }
  .hero::after {
    content: ''; position: absolute; inset: -40px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.18) 0%, transparent 60%);
    z-index: -1;
  }

  h1.title { font-weight: 600; font-size: 56px; letter-spacing: -0.035em; line-height: 1.02; margin-bottom: 14px; }
  p.subtitle { font-size: 17px; color: var(--t-2); max-width: 560px; line-height: 1.5; margin: 0 auto; }

  .scan-card {
    margin-top: 44px; padding: 22px 24px; border-radius: var(--r-lg);
    background: rgba(0,0,0,0.22); border: 1px solid var(--g-edge-mid);
    text-align: left;
  }
  .scan-minimal { display: flex; align-items: center; gap: 20px; padding: 20px 24px; }
  .scan-ring { position: relative; width: 56px; height: 56px; flex-shrink: 0; }
  .scan-ring svg { width: 100%; height: 100%; }
  .scan-pct { position: absolute; inset: 0; display: grid; place-items: center;
              font-family: 'JetBrains Mono'; font-size: 12px; font-weight: 500; letter-spacing: -0.02em; }
  .scan-text { flex: 1; min-width: 0; text-align: left; }
  .scan-status { font-size: 15px; font-weight: 500; letter-spacing: -0.01em; line-height: 1.3; }
  .scan-status span { color: var(--t-2); }
  .scan-meta { font-size: 12px; color: var(--t-3); margin-top: 4px; font-family: 'JetBrains Mono'; }
  .scan-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .scan-head .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--t-3); font-weight: 600; }
  .scan-head .count { font-family: 'JetBrains Mono'; font-size: 12px; color: var(--t-2); }

  .scan-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px 14px; }
  .scan-item { display: flex; align-items: center; gap: 9px; font-size: 13px; color: var(--t-2); }
  .scan-item .s-check {
    width: 18px; height: 18px; border-radius: 50%;
    background: rgba(138,255,199,0.2); border: 1px solid rgba(138,255,199,0.4);
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238affc7' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><polyline points='20 6 9 17 4 12'/></svg>"); background-size: 11px; background-position: center; background-repeat: no-repeat;
    flex-shrink: 0;
  }
  .scan-item.doing { color: var(--t-1); }
  .scan-item.doing .s-check {
    background: transparent; border: 1px solid rgba(255,255,255,0.3);
    background-image: none;
    position: relative;
  }
  .scan-item.doing .s-check::after {
    content: ''; position: absolute; inset: 2px; border-radius: 50%;
    border: 1.5px solid transparent; border-top-color: #fff; border-right-color: #fff;
    animation: spin 0.9s linear infinite;
  }
  .scan-item.idle { color: var(--t-3); }
  .scan-item.idle .s-check { background: transparent; border: 1px solid rgba(255,255,255,0.14); }
  @keyframes spin { to { transform: rotate(360deg); } }

  .shortcuts { display: flex; justify-content: center; gap: 20px; margin-top: 32px; }
  .sc { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--t-2); }
  .kbd { display: inline-flex; align-items: center; gap: 4px; }
  .kbd span {
    font-family: 'JetBrains Mono'; font-size: 11px; font-weight: 600;
    padding: 3px 7px; border-radius: 5px; background: rgba(255,255,255,0.08);
    border: 1px solid var(--g-edge-mid); border-bottom-width: 2px; color: var(--t-1);
  }

  .actions { display: flex; justify-content: center; margin-top: 38px; }
</style>
</head>
<body>
<div class="wallpaper"></div>
<div class="vignette"></div>
<div class="stage">

  <div class="onb glass heavy">
    <div class="onb-steps">
      <div class="step-pill done"><span class="num">1</span>Provider</div>
      <div class="step-divider"></div>
      <div class="step-pill done"><span class="num">2</span>Key</div>
      <div class="step-divider"></div>
      <div class="step-pill active"><span class="num">3</span>Ready</div>
    </div>

    <div class="hero">B</div>

    <h1 class="title">You're in.</h1>
    <p class="subtitle">BLADE is reading your system to calibrate. This takes a few seconds. You'll never do it again.</p>

    <div class="scan-card scan-minimal">
      <div class="scan-ring" aria-hidden="true">
        <svg viewBox="0 0 44 44">
          <circle cx="22" cy="22" r="20" stroke="rgba(255,255,255,0.12)" stroke-width="3" fill="none"/>
          <circle cx="22" cy="22" r="20" stroke="#ffffff" stroke-width="3" fill="none"
                  stroke-linecap="round" stroke-dasharray="125.6" stroke-dashoffset="31.4"
                  transform="rotate(-90 22 22)" style="filter: drop-shadow(0 0 6px rgba(255,255,255,0.6));"/>
        </svg>
        <div class="scan-pct">75%</div>
      </div>
      <div class="scan-text">
        <div class="scan-status">Calibrating — <span>reading audio devices</span></div>
        <div class="scan-meta">9 of 12 scanners complete · 4.2s elapsed</div>
      </div>
    </div>

    <div class="shortcuts">
      <div class="sc">Anywhere <span class="kbd"><span>Ctrl</span><span>Space</span></span></div>
      <div class="sc">Voice <span class="kbd"><span>Ctrl</span><span>Shift</span><span>B</span></span></div>
      <div class="sc">Wake word <span class="kbd"><span>"Hey BLADE"</span></span></div>
    </div>

    <div class="actions">
      <a class="btn primary lg hotspot primary-cta" href="dashboard.html">
        Enter BLADE
        <svg class="icon-svg" style="width:16px;height:16px;stroke-width:2" viewBox="0 0 24 24"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </a>
    </div>
  </div>

</div>
<script>window.PROTO_CURRENT = 'onboarding-03-ready.html';</script>
<script src="proto.js"></script>
</body>
</html>
