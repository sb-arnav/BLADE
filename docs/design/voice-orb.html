<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>BLADE — Voice orb · Live</title>
<link rel="stylesheet" href="shared.css"/>
<link rel="stylesheet" href="orb.css"/>
<link rel="stylesheet" href="proto.css"/>
<style>
  /* Simulate a Tauri borderless, transparent, non-activating NSPanel
     positioned anywhere on the desktop. Full viewport shown for review. */

  .live-stage {
    position: absolute; inset: 0;
    display: grid; place-items: center;
    z-index: 2;
  }

  /* The actual overlay window — scaled up for visibility, but the
     spec is still 440×440. */
  .overlay-window {
    position: relative;
    width: 560px; height: 560px;
    display: grid; place-items: center;
    isolation: isolate;
  }

  .overlay-window .orb-overlay { width: 440px; height: 440px; }

  /* Chrome hint — shown only when hovered. In the real app this is invisible. */
  .hover-controls {
    position: absolute; top: 16px; right: 16px;
    display: flex; gap: 6px; opacity: 0;
    transition: opacity 200ms;
  }
  .overlay-window:hover .hover-controls { opacity: 1; }
  .hover-controls .icon-btn {
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    display: grid; place-items: center; color: rgba(255,255,255,0.8);
    cursor: pointer;
  }
  .hover-controls .icon-btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; }

  /* Live transcript under the orb — Cluely peripheral readability (60ch max) */
  .live-caption {
    position: absolute; bottom: 60px; left: 50%;
    transform: translateX(-50%);
    width: 480px; text-align: center;
    color: rgba(255, 255, 255, 0.92);
    font-size: 18px; line-height: 1.4; letter-spacing: -0.015em;
    font-weight: 400;
  }
  .live-caption .final { color: #fff; }
  .live-caption .partial { color: rgba(255,255,255,0.55); }
  .live-caption .caret {
    display: inline-block; width: 2px; height: 18px; margin-left: 2px;
    background: #fff; vertical-align: -3px;
    animation: caret-blink 1s step-end infinite;
  }

  /* Phase chip */
  .phase-chip {
    position: absolute; top: 36px; left: 50%;
    transform: translateX(-50%);
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 14px 6px 10px;
    border-radius: 999px;
    background: rgba(10, 5, 30, 0.55);
    border: 1px solid rgba(255, 255, 255, 0.14);
    backdrop-filter: blur(20px) saturate(160%);
    color: rgba(255, 255, 255, 0.92);
    font-size: 12px; font-weight: 500; letter-spacing: -0.005em;
  }
  .phase-chip .d { width: 8px; height: 8px; border-radius: 50%; background: #8affc7; box-shadow: 0 0 10px #8affc7;
                   animation: pulse-dot 1.4s ease-in-out infinite; }
  .phase-chip .t { font-family: 'JetBrains Mono'; font-size: 11px; color: rgba(255,255,255,0.55); margin-left: 4px; padding-left: 8px; border-left: 1px solid rgba(255,255,255,0.15); }

  /* Keyboard hints at the bottom of the viewport */
  .key-hints {
    position: absolute; bottom: 36px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 20px;
    font-size: 12px; color: rgba(255,255,255,0.55);
  }
  .key-hints .row { display: flex; align-items: center; gap: 8px; }
  .kbd {
    font-family: 'JetBrains Mono'; font-size: 10px; font-weight: 600;
    padding: 3px 7px; border-radius: 5px;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.14);
    color: rgba(255,255,255,0.85);
  }

  /* Phase switcher — prototype-only */
  .phase-switcher {
    position: absolute; top: 24px; left: 24px; z-index: 300;
    display: flex; gap: 4px;
    padding: 6px;
    background: rgba(10, 5, 30, 0.55);
    border: 1px solid rgba(255, 255, 255, 0.14);
    backdrop-filter: blur(20px) saturate(160%);
    border-radius: 999px;
    font-family: 'Inter'; font-size: 11px;
  }
  .phase-switcher .ps {
    padding: 6px 12px; border-radius: 999px;
    color: rgba(255,255,255,0.65);
    cursor: pointer; border: none; background: transparent;
    font: inherit; letter-spacing: -0.005em;
    transition: all 160ms;
  }
  .phase-switcher .ps:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .phase-switcher .ps.active {
    background: rgba(255,255,255,0.18);
    color: #fff;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.22);
  }
</style>
</head>
<body>
<div class="wallpaper"></div>
<div class="vignette"></div>

<!-- Phase switcher — prototype convenience, not part of the real app -->
<div class="phase-switcher" data-proto-only>
  <button class="ps" data-phase="idle">Idle</button>
  <button class="ps active" data-phase="listening">Listening</button>
  <button class="ps" data-phase="thinking">Thinking</button>
  <button class="ps" data-phase="speaking">Speaking</button>
</div>

<div class="live-stage">
  <div class="overlay-window" id="stage">

    <!-- Phase chip (top) -->
    <div class="phase-chip" id="phase-chip">
      <span class="d"></span>
      <span id="phase-name">Listening</span>
      <span class="t" id="phase-time">00:04.2</span>
    </div>

    <!-- The orb -->
    <div class="orb-overlay" data-phase="listening" id="orb">
      <svg class="orb-rings" viewBox="-220 -220 440 440">
        <circle class="ring ring-0" cx="0" cy="0" r="90"/>
        <circle class="ring ring-1" cx="0" cy="0" r="90"/>
        <circle class="ring ring-2" cx="0" cy="0" r="90"/>
      </svg>
      <svg class="orb-arcs" viewBox="-220 -220 440 440">
        <circle class="arc arc-1" cx="0" cy="0" r="70"/>
        <circle class="arc arc-2" cx="0" cy="0" r="70"/>
      </svg>
      <div class="orb-core"></div>
    </div>

    <!-- Hover controls (invisible by default — Cluely-style) -->
    <div class="hover-controls">
      <button class="icon-btn" title="Pause"><svg viewBox="0 0 24 24"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg></button>
      <button class="icon-btn" title="Close"><svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>

    <!-- Live caption -->
    <div class="live-caption" id="caption">
      <span class="final" id="caption-final">So the plan is we ship the glass overlay this week, then </span><span class="partial" id="caption-partial">start stress testing against varied wallpapers</span><span class="caret"></span>
    </div>
  </div>

  <div class="key-hints">
    <div class="row">Invoke <span class="kbd">Ctrl</span><span class="kbd">Shift</span><span class="kbd">B</span></div>
    <div class="row">Wake <span class="kbd">"Hey BLADE"</span></div>
    <div class="row">Send <span class="kbd">Enter</span></div>
    <div class="row">Cancel <span class="kbd">Esc</span></div>
  </div>
</div>

<script>
  (function () {
    const orb = document.getElementById('orb');
    const chip = document.getElementById('phase-chip');
    const phaseName = document.getElementById('phase-name');
    const captionFinal = document.getElementById('caption-final');
    const captionPartial = document.getElementById('caption-partial');
    const caption = document.getElementById('caption');
    const switcher = document.querySelectorAll('.phase-switcher .ps');

    const phaseMap = {
      idle:      { label: 'Idle',      dotClass: 'idle',      final: 'Resting. Say "Hey BLADE" or hit ', partial: 'Ctrl + Shift + B to wake me.' },
      listening: { label: 'Listening', dotClass: 'listening', final: 'So the plan is we ship the glass overlay this week, then ', partial: 'start stress testing against varied wallpapers' },
      thinking:  { label: 'Thinking',  dotClass: 'thinking',  final: 'Checking three files and the repo layout — ', partial: 'one moment.' },
      speaking:  { label: 'Speaking',  dotClass: 'speaking',  final: 'Ship it Friday. I drafted the commit and queued the preview ', partial: 'for Simran — approve?' },
    };

    function setPhase(p) {
      orb.setAttribute('data-phase', p);
      phaseName.textContent = phaseMap[p].label;
      const dot = chip.querySelector('.d');
      dot.className = 'd ' + phaseMap[p].dotClass;
      captionFinal.textContent = phaseMap[p].final;
      captionPartial.textContent = phaseMap[p].partial;
      switcher.forEach((b) => b.classList.toggle('active', b.dataset.phase === p));
    }

    switcher.forEach((b) => b.addEventListener('click', () => setPhase(b.dataset.phase)));

    window.PROTO_CURRENT = 'voice-orb.html';
  })();
</script>
<script src="proto.js"></script>
</body>
</html>
