    section: core
    phase: 3
    palette_visible: true
    shortcut: "Mod+1"
    data_shape: "PerceptionState + HormoneState (split across RightNowHero + AmbientStrip children)"
    data_source:
      - invoke: perception_get_latest
      - invoke: perception_update
      - invoke: homeostasis_get
      - event: hormone_update
    flow_status: "data pipes"
    reachable_paths:
      - "route:dashboard -> RightNowHero.invokeTyped('perception_get_latest') -> src-tauri/src/perception_fusion.rs"
      - "route:dashboard -> AmbientStrip.useTauriEvent(BLADE_EVENTS.HORMONE_UPDATE) -> src-tauri/src/homeostasis.rs"
    notes: "DASH-01..08; Dashboard composes RightNowHero + AmbientStrip + ComingSoonCards (3 placeholder cards for Hive/Calendar/Integrations are cosmetic placeholders within an otherwise-wired surface)"

